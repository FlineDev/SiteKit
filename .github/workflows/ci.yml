name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # The runner's default toolchain lags behind (Swift 6.1 on macos-latest
      # as of mid-2026); install the declared minimum explicitly.
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # Linux with Swift 6.2 mirrors the declared toolchain minimum and the
  # environment the blueprint deploy workflows actually run on.
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Build
        run: swift build
      - name: Test
        run: swift test
