name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    # macos-26 ships Xcode's Swift 6.2 with a matching OS runtime. A swift.org
    # toolchain on an older image builds fine but crashes at test load because
    # the system Swift runtime lacks the newer stdlib symbols.
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # Linux with Swift 6.2 mirrors the declared toolchain minimum and the
  # environment the blueprint deploy workflows actually run on.
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Build
        run: swift build
      - name: Test
        run: swift test
