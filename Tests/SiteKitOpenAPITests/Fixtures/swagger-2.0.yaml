swagger: '2.0'
info:
  title: Legacy Petstore
  version: 1.0.0
host: petstore.swagger.io
basePath: /v1
schemes:
  - https
paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      responses:
        '200':
          description: A list of pets
definitions:
  Pet:
    type: object
    required:
      - id
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
