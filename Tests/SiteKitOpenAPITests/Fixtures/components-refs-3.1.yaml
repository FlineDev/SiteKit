openapi: 3.1.0
info:
  title: Refs API
  version: 1.0.0
  description: Exercises in-file component $ref resolution for parameters, responses, and request bodies.
tags:
  - name: items
    description: Item endpoints that factor shared parameters and responses into components.
paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      tags: [items]
      parameters:
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: A page of items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createItem
      summary: Create an item
      tags: [items]
      requestBody:
        $ref: '#/components/requestBodies/ItemBody'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
components:
  parameters:
    PageLimit:
      name: limit
      in: query
      description: Maximum number of items to return.
      required: false
      schema:
        type: integer
        format: int32
  requestBodies:
    ItemBody:
      description: The item to create.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Item'
  responses:
    Unauthorized:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Item:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
