   items:
      - title: "Archive"
        url: "/blog/"
        icon: "fa-solid fa-box-archive"
      - title: "About"
        url: "/about/"
        icon: "fa-solid fa-circle-info"

footer:
   links:
      - title: "Privacy Policy"
        url: "/privacy/"
      - title: "Imprint"
        url: "/imprint/"
   social:
      - platform: "bluesky"
        url: "https://bsky.app/profile/your-handle.bsky.social"
      - platform: "mastodon"
        url: "https://mastodon.social/@your-handle"
        rel: "me"
