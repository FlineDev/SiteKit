name: "Notes & Notebooks"
baseURL: "https://example.com"
description: "A sample SiteKit blog used to render real theme previews."
outputDirectory: "_Site"
contentDirectory: "Content"
language: "en"

# Two languages activate the language picker (globe icon) in the rendered chrome.
# The default English locale still lives at the root, so _Site/index.html is the
# preview-friendly landing page the inliner picks up.
localization:
   defaultLanguage: "en"
   languages: ["de"]
   translationMode: "manual"

author:
   name: "Sam Rivera"
   email: "sam@example.com"

navigation:
   logo:
      text: "Notes"
   items:
      - title: "Articles"
        url: "/blog/"
      - title: "Snippets"
        url: "/snippets/"
      - title: "Tags"
        url: "/tags/"
      - title: "About"
        url: "/about/"

homePage:
   title: "Notes & Notebooks"
   subtitle: "Short essays on Swift, static-site tooling, and the craft of shipping small things well."
   recentPostsCount: 4

sections:
   - name: "Blog"
     slug: "blog"
     contentDirectory: "Blog"
     urlPrefix: "blog"
   - name: "Snippets"
     slug: "snippets"
     contentDirectory: "Snippets"
     urlPrefix: "snippets"

# Promotions exercise the .sk-promo card styling in the theme preview.
# endSlots + inlineSlots are pinned so the preview always renders one
# end-of-article card and one inline card regardless of read time.
promotions:
   endSlots: 1
   inlineSlots: 1
   items:
      - id: "newsletter"
        weight: 1
        style: "highlight"
        emoji: "📬"
        title: "Enjoying these notes?"
        text: "Get new essays on Swift tooling in your inbox – no more than one a week."
        linkURL: "/blog/"
        linkText: "Read the latest"
      - id: "toolkit"
        weight: 1
        style: "info"
        emoji: "🧰"
        title: "Built with SiteKit"
        text: "This site is generated by SiteKit, an AI-first Swift static-site generator."
        linkURL: "/about/"
        linkText: "How it works"

footer:
   copyrightName: "Sam Rivera"
   startYear: 2026
   # Social links activate the follow-me footer (.sk-author-follow) on articles
   # and the .sk-social-links row in the site footer.
   social:
      - platform: "mastodon"
        url: "https://mastodon.social/@samrivera"
      - platform: "github"
        url: "https://github.com/samrivera"
